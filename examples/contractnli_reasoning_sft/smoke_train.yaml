### Smoke test: contractNLI reasoning SFT, 2 steps only
### model
model_name_or_path: Qwen/Qwen3-4B-Instruct-2507
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_target: all

### dataset
dataset_dir: ../../data/lf_ready/contractnli_reasoning_sft
dataset: train
eval_dataset: valid
template: qwen3_nothink
cutoff_len: 2048
preprocessing_num_workers: 4
overwrite_cache: true

### output
output_dir: ../../outputs/contractnli_reasoning_sft_smoke/model
logging_steps: 1
save_strategy: steps
save_steps: 2
overwrite_output_dir: true
save_only_model: false
report_to: none

### train — minimal, 2 steps
max_steps: 2
per_device_train_batch_size: 2
gradient_accumulation_steps: 1
learning_rate: 1.0e-4
bf16: true
ddp_timeout: 180000000
