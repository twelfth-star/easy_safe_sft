### ContractNLI reasoning SFT — full run aligned with Tinker config
### model
model_name_or_path: Qwen/Qwen3-4B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_target: all

### dataset
dataset_dir: ../../data/lf_ready/contractnli_reasoning_sft_full
dataset: train
eval_dataset: valid
template: qwen3_nothink
cutoff_len: 20480
preprocessing_num_workers: 16
dataloader_num_workers: 4
overwrite_cache: true

### output
output_dir: ../../outputs/contractnli_reasoning_sft_full/model
logging_steps: 1
save_strategy: steps
save_steps: 20
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
run_name: contractnli_reasoning_sft_full

### train
# Tinker: batch_size=32, 1 epoch. With 2 GPUs, per_device=8, grad_accum=2 → effective 32
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
num_train_epochs: 1.0
learning_rate: 2.0e-4
lr_scheduler_type: linear
warmup_ratio: 0.0
bf16: true
ddp_timeout: 180000000
